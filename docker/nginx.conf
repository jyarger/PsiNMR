# NOTE: no `types { ... }` block here on purpose. Declaring one would
# REPLACE nginx's entire inherited MIME table (from /etc/nginx/mime.types,
# included at the http level), causing every file — including index.html —
# to be served as application/octet-stream and downloaded by the browser.
# The stock mime.types in nginx >= 1.21 already maps application/wasm.

# Response cache for the BMRB reverse proxy (below). This file is included
# inside nginx's `http` context (via conf.d/*.conf), so http-level directives
# like proxy_cache_path are valid here, before the server block.
proxy_cache_path /var/cache/nginx/bmrb levels=1:2 keys_zone=bmrb_cache:10m
                 max_size=1g inactive=7d use_temp_path=off;

server {
    listen       80;
    listen       [::]:80;
    # HTTPS with a self-signed certificate generated at container startup
    # (see docker/10-gen-self-signed-cert.sh). Used for local HTTPS review and
    # for Cloudflare "Full" origin connections. Behind a Cloudflare Tunnel
    # only port 80 is used (the tunnel provides TLS at the edge). Browsers
    # show a one-time trust warning for the self-signed cert locally.
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    ssl_certificate     /etc/nginx/ssl/psinmr.crt;
    ssl_certificate_key /etc/nginx/ssl/psinmr.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Compress text-like assets. Wasm is included; it compresses well and
    # nginx sets Content-Encoding so the browser decompresses transparently.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.wasm$ {
        include /etc/nginx/security-headers.conf;
        # Backup in case mime.types ever loses the wasm entry; the correct
        # type is required for WebAssembly.instantiateStreaming.
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Same-origin reverse proxy for the BMRB data server, which sends no
    # CORS headers (see src/demo/psinmr/bmrb.ts). Mirrored in vite.config.ts
    # for the dev server. Every user's BMRB fetch transits this box, so we
    # cap timeouts and cache responses (BMRB entry files are immutable).
    location /bmrb-data/ {
        include /etc/nginx/security-headers.conf;
        proxy_pass https://bmrb.io/ftp/pub/bmrb/metabolomics/entry_directories/;
        proxy_set_header Host bmrb.io;
        proxy_ssl_server_name on;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;

        proxy_cache          bmrb_cache;
        proxy_cache_key       $uri;
        proxy_cache_valid     200 302 7d;
        proxy_cache_valid     404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock      on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # The app uses HashRouter, so the server only ever needs to return
    # index.html; client-side routing takes over from there.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
