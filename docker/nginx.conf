# NOTE: no `types { ... }` block here on purpose. Declaring one would
# REPLACE nginx's entire inherited MIME table (from /etc/nginx/mime.types,
# included at the http level), causing every file — including index.html —
# to be served as application/octet-stream and downloaded by the browser.
# The stock mime.types in nginx >= 1.21 already maps application/wasm.

server {
    listen       80;
    listen       [::]:80;
    # HTTPS with a self-signed certificate generated at container startup
    # (see docker/10-gen-self-signed-cert.sh). Browsers will show a one-time
    # trust warning for the self-signed cert; that is expected locally.
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    ssl_certificate     /etc/nginx/ssl/psinmr.crt;
    ssl_certificate_key /etc/nginx/ssl/psinmr.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Compress text-like assets. Wasm is included; it compresses well and
    # nginx sets Content-Encoding so the browser decompresses transparently.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.wasm$ {
        # Backup in case mime.types ever loses the wasm entry; the correct
        # type is required for WebAssembly.instantiateStreaming.
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The app uses HashRouter, so the server only ever needs to return
    # index.html; client-side routing takes over from there.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
