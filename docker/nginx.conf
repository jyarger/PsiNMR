server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # WebAssembly must be served with the correct MIME type so browsers can
    # use streaming compilation (WebAssembly.instantiateStreaming).
    types {
        application/wasm wasm;
    }

    # Compress text-like assets. Wasm is included; it compresses well and
    # nginx sets Content-Encoding so the browser decompresses transparently.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The app uses HashRouter, so the server only ever needs to return
    # index.html; client-side routing takes over from there.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
