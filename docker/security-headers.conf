# Security headers for PsiNMR — included in every location block.
#
# nginx does NOT inherit `add_header` into a location that defines its own
# `add_header`, so this snippet is `include`d in each location rather than set
# once at the server level. `always` sends the headers on error responses too.
#
# Content-Security-Policy notes:
#   script-src   'wasm-unsafe-eval' is required to instantiate the Rust/Wasm
#                compute engine. 'unsafe-eval' is required by OpenChemLib
#                (the molecule editor / prediction, via react-ocl), which uses
#                asm.js/eval internally — removing it breaks structure editing.
#                Dropping 'unsafe-eval' is a hardening step worth testing if
#                you stop relying on the molecule tools.
#   connect-src  intentionally allows any https origin: the "Load from a URL"
#                scanner and the nmrXiv archives (s3.uni-jena.de) fetch
#                user-specified / third-party data servers by design. The
#                high-value protections here are script-src, object-src,
#                base-uri and frame-ancestors, not connect-src.
#   style-src    'unsafe-inline' is required by Emotion, which injects styles.
# frame-ancestors is intentionally open (*): PsiNMR is designed to be embedded
# in any external app's iframe (see the /embed postMessage bridge). X-Frame-
# Options is omitted for the same reason — it has no "allow any origin" value,
# and CSP frame-ancestors supersedes it in modern browsers. This is safe for
# the stateless Lite app, which has no accounts or destructive actions.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: blob: data:; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors *" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
